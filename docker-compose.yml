services:
  postgres:
    container_name: 'comms_gatekeeper_db'
    image: 'postgres:16'
    restart: always
    user: postgres
    volumes:
      - postgres_volume:/var/lib/postgresql
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=pass1234
      - POSTGRES_DB=comms_gatekeeper
    ports:
      - '5450:5432'
volumes:
  postgres_volume:
